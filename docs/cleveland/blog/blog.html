<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleveland - Blog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Playwrite+ES:wght@100..400&family=Playwrite+NO:wght@100..400&family=Playwrite+US+Modern:wght@100..400&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="blog.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <!-- NAV -->
    <nav class="main-nav"></nav>

    <section class="hero2">
        <div class="hero-overlay2">
            <div class="hero-content2">
                <h1>Nuestro Blog Institucional</h1>
                <p>Artículos, novedades y tips tecnológicos para potenciar tu aprendizaje del inglés</p>
            </div>
        </div>
    </section>

    <main class="blog-main-content">
        <div class="blog-container">
            <!-- Bloque del Buscador -->
            <div class="search-wrapper-center">
                <div class="input-wrapper">
                    <button class="icon">
                        <svg
                            width="25px"
                            height="25px"
                            viewBox="0 0 24 24"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                d="M11.5 21C16.7467 21 21 16.7467 21 11.5C21 6.25329 16.7467 2 11.5 2C6.25329 2 2 6.25329 2 11.5C2 16.7467 6.25329 21 11.5 21Z"
                                stroke="#B5D325"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            ></path>
                            <path
                                d="M22 22L20 20"
                                stroke="#B5D325"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                            ></path>
                        </svg>
                    </button>
                    <input type="text" name="text" class="input" placeholder="Buscar en el blog..." />
                </div>
            </div>

            <!-- Bloque de Mensaje Vacío (NUEVO) -->
            <div class="empty-state-container">
                <div class="empty-state-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 3H5C3.89543 3 3 3.89543 3 5V19C3 20.1046 3.89543 21 5 21H19C20.1046 21 21 20.1046 21 19V5C21 3.89543 20.1046 3 19 3Z" stroke="#B5D325" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M9 9H15" stroke="#B5D325" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M9 13H15" stroke="#B5D325" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M9 17H13" stroke="#B5D325" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h3>¡Ups! Aun no hay publicaciones</h3>
                <p>Estamos preparando el mejor contenido para potenciar tu aprendizaje. ¡Vuelve pronto!</p>
            </div>
        </div>
    </main>

    <footer class="site-footer"></footer>

    <script src="../script.js"></script>
</body>
</html>
