<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedbacks - Cleveland & Menciones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            color: #B5D325;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.7;
            margin-bottom: 50px;
        }
        .cards {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 45px 55px;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            min-width: 220px;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(181, 211, 37, 0.05), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .card:hover::before {
            opacity: 1;
        }
        .card:hover {
            transform: translateY(-10px);
            border-color: #B5D325;
            box-shadow: 0 20px 50px rgba(181, 211, 37, 0.15);
        }
        .card .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 15px;
        }
        .card h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            color: #B5D325;
            transition: color 0.3s ease;
        }
        .card:hover h2 {
            color: #ffffff;
        }
        .card p {
            margin: 0;
            opacity: 0.6;
            font-size: 0.9rem;
        }
        .card:hover p {
            opacity: 0.9;
        }
        .footer {
            margin-top: 50px;
            opacity: 0.4;
            font-size: 0.8rem;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            .card {
                padding: 30px 35px;
                min-width: 160px;
                width: 100%;
            }
            .cards {
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📂 Feedbacks</h1>
        <p class="subtitle">Selecciona la página que deseas visitar</p>
        <div class="cards">
            <a href="/feedbacks/menciones/" class="card">
                <span class="icon">📝</span>
                <h2>Menciones</h2>
                <p>Página de menciones y feedbacks</p>
            </a>
            <a href="/feedbacks/cleveland/" class="card">
                <span class="icon">🏫</span>
                <h2>Cleveland</h2>
                <p>Cleveland English Institute</p>
            </a>
        </div>
        <p class="footer">GitHub Pages · feedbacKs</p>
    </div>
</body>
</html>
